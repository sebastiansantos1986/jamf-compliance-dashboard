name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Bash syntax
        run: bash -n jamf_collect_os_versions.sh
      - name: Run ShellCheck
        run: shellcheck jamf_collect_os_versions.sh
      - name: Run tests
        run: python3 -m unittest discover -s tests -v
